<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Søvndagbok</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Prevent iOS input zoom */
    input, select, textarea { font-size: 16px !important; }

    /* Loading spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e7ff;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hide utility */
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #eef2ff 100%);">

<!--
-- Run this in Supabase SQL Editor (full reset — replaces old schema)

drop table if exists sleep_entries cascade;
drop table if exists profiles cascade;

create table children (
  id uuid default gen_random_uuid() primary key,
  name text not null,
  share_code text unique not null,
  created_at timestamptz default now()
);

create table child_members (
  child_id uuid references children on delete cascade not null,
  user_id uuid references auth.users on delete cascade not null,
  primary key (child_id, user_id)
);

create table sleep_entries (
  id uuid default gen_random_uuid() primary key,
  child_id uuid references children on delete cascade not null,
  date date not null,
  q1 smallint,
  nap boolean,
  nap_times text,
  medication text,
  time_in_bed text,
  time_sleep_attempt text,
  sleep_onset int,
  awakenings_count int,
  wake_time int,
  final_awakening text,
  got_up text,
  q10 smallint,
  created_at timestamptz default now(),
  updated_at timestamptz default now(),
  unique(child_id, date)
);

alter table children enable row level security;
alter table child_members enable row level security;
alter table sleep_entries enable row level security;

create policy "Members read child" on children
  for select using (exists (select 1 from child_members where child_id = id and user_id = auth.uid()));
create policy "Auth users create child" on children
  for insert to authenticated with check (true);

create policy "Users read own memberships" on child_members
  for select using (user_id = auth.uid());
create policy "Users join child" on child_members
  for insert to authenticated with check (user_id = auth.uid());

create policy "Members manage entries" on sleep_entries
  for all using (exists (select 1 from child_members where child_id = sleep_entries.child_id and user_id = auth.uid()))
  with check (exists (select 1 from child_members where child_id = sleep_entries.child_id and user_id = auth.uid()));
-->

        <path d="M47.532 24.552c0-1.636-.132-3.2-.388-4.704H24.48v8.898h12.944c-.556 3.01-2.242 5.562-4.782 7.278v6.048h7.742c4.532-4.176 7.148-10.326 7.148-17.52z" fill="#4285F4"/>
        <path d="M24.48 48c6.492 0 11.942-2.154 15.922-5.83l-7.742-6.048c-2.148 1.44-4.896 2.29-8.18 2.29-6.294 0-11.622-4.252-13.524-9.972H2.952v6.248C6.912 42.854 15.12 48 24.48 48z" fill="#34A853"/>
        <path d="M10.956 28.44A14.396 14.396 0 0 1 10.13 24c0-1.544.268-3.048.826-4.44v-6.248H2.952A23.978 23.978 0 0 0 .48 24c0 3.876.926 7.546 2.472 10.688l8.004-6.248z" fill="#FBBC05"/>
        <path d="M24.48 9.584c3.546 0 6.73 1.218 9.234 3.612l6.918-6.918C36.41 2.388 30.962 0 24.48 0 15.12 0 6.912 5.146 2.952 13.312l8.004 6.248c1.902-5.72 7.23-9.976 13.524-9.976z" fill="#EA4335"/>

    <p class="text-xs text-slate-400 mt-5">
      Ved å logge inn godtar du vår

<!-- ===== SCREEN: CHILDREN ===== -->
<div id="screen-children" class="hidden fixed inset-0 flex items-center justify-center bg-slate-50 p-4 overflow-y-auto">
  <div class="w-full max-w-sm">
    <!-- Top bar -->
    <div class="flex items-center justify-between mb-6">
      <!-- Avatar + sign out -->
      <div class="flex items-center gap-2">
        <img id="children-avatar-img" src="" alt="" class="w-8 h-8 rounded-full border border-slate-200 object-cover hidden" />
        <div id="children-avatar-fallback" class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-xs font-bold hidden"></div>
        <button onclick="signOut()" class="text-xs text-slate-400 hover:text-red-500 transition" id="children-signout-btn"></button>
      </div>
      <!-- Back link (only shown when user already has children) -->
      <a id="children-back-link" href="#" onclick="showScreen('app'); return false;" class="hidden text-sm text-indigo-600 hover:underline" id="children-back-link"></a>
      <!-- Language toggle -->
      <button
        id="children-lang-btn"
        onclick="toggleLang()"
        class="text-xs font-semibold px-3 py-1.5 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 transition"
      ></button>
    </div>

    <!-- Title -->
    <div class="text-center mb-6">
      <div class="text-3xl mb-1">🌙</div>
      <h1 class="text-2xl font-bold text-slate-800" id="children-title"></h1>
      <p class="text-sm text-slate-400 mt-1">Basert på <a href="https://www.helse-bergen.no/nasjonal-kompetansetjeneste-for-sovnsykdommer-sovno/sovndagbok-sovno" target="_blank" rel="noopener" class="underline hover:text-slate-600">søvndagbok fra Helse Bergen</a></p>
    </div>

    <!-- Card: Create child -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
      <p class="text-sm font-semibold text-slate-700 mb-3" id="create-child-heading"></p>
      <input
        type="text"
        id="new-child-name"
        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 mb-3"
        id="new-child-name"
      />
      <button
        onclick="createChild()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition"
        id="btn-create-child"
      ></button>
      <p id="create-error" class="text-sm mt-2 hidden"></p>
    </div>

    <!-- Card: Join with code -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <p class="text-sm font-semibold text-slate-700 mb-3" id="join-child-heading"></p>
      <input
        type="text"
        id="join-code"
        maxlength="6"
        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 mb-3 font-mono uppercase tracking-widest"

      />
      <button
        onclick="joinChild()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition"

<!-- ===== SCREEN: APP ===== -->
<div id="screen-app" class="hidden">
  <!-- Header -->
  <header class="sticky top-0 z-10" style="background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); box-shadow: 0 2px 12px rgba(79,70,229,0.18);">
    <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold text-white" id="app-title"></h1>
      <!-- Child badge (center) -->
      <div class="absolute left-1/2 -translate-x-1/2">
        <button
          id="child-badge"
          onclick="cycleChild()"
          class="text-white text-xs font-semibold px-3 py-1 rounded-full transition"
          style="background: rgba(255,255,255,0.2); backdrop-filter: blur(4px);"
          title="Bytt barn / Switch child"
        ></button>
      </div>
      <div class="flex items-center gap-2">
        <button
          id="app-lang-btn"
          onclick="toggleLang()"
          class="text-xs font-semibold px-2.5 py-1 rounded-lg text-white/80 hover:text-white transition"
          style="border: 1px solid rgba(255,255,255,0.3);"
        ></button>
        <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full border-2 border-white/40 object-cover hidden" />
        <div id="user-avatar-fallback" class="w-8 h-8 rounded-full flex items-center justify-center text-indigo-700 text-xs font-bold hidden" style="background: rgba(255,255,255,0.9);"></div>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <div class="bg-white border-b border-slate-200 sticky top-[57px] z-10">
    <div class="max-w-lg mx-auto px-4 flex">
      <button id="tab-new-btn" onclick="switchTab('new')" class="tab-btn flex-1 py-3 text-sm font-semibold border-b-2 transition" data-tab="new"></button>
      <button id="tab-history-btn" onclick="switchTab('history')" class="tab-btn flex-1 py-3 text-sm font-semibold border-b-2 transition" data-tab="history"></button>
      <button id="tab-settings-btn" onclick="switchTab('settings')" class="tab-btn flex-1 py-3 text-sm font-semibold border-b-2 transition" data-tab="settings"></button>
    </div>
  </div>

  <!-- Tab content -->
  <main class="max-w-lg mx-auto px-4 py-6">

    <!-- ===== TAB: NEW ENTRY ===== -->
    <div id="tab-new" class="tab-panel">
      <form id="entry-form" onsubmit="handleSaveEntry(event)">
        <!-- Date -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
          <label class="block text-xs uppercase tracking-wide text-slate-400 font-semibold mb-2" id="label-date"></label>
          <input
            type="date"
            id="entry-date"
            class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            required
          />
        </div>

        <!-- SECTION: Before bedtime -->
        <div class="mb-2 mt-5 px-1 flex items-center gap-2">
          <div class="w-0.5 h-4 bg-indigo-400 rounded-full"></div>
          <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold" id="section-before"></p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 space-y-5">
          <!-- Q1: Daytime functioning -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q1"></label>
            <div class="flex flex-wrap gap-2" id="q1-radios"></div>
          </div>

          <!-- Q2: Naps -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q2"></label>
            <div class="flex gap-4 mb-2">
              <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                <input type="radio" name="nap" value="yes" id="nap-yes" onchange="toggleNapTimes()" class="accent-indigo-600" />
                <span id="label-yes"></span>
              </label>
              <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                <input type="radio" name="nap" value="no" id="nap-no" onchange="toggleNapTimes()" class="accent-indigo-600" />
                <span id="label-no"></span>
              </label>
            </div>
            <div id="nap-times-wrap" class="hidden">
              <textarea
                id="nap-times"
                rows="2"
                class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"
              ></textarea>
            </div>
          </div>

          <!-- Q3: Medication (optional) -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q3"></label>
            <input
              type="text"
              id="medication"
              class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>
        </div>

        <!-- SECTION: Morning -->
        <div class="mb-2 mt-5 px-1 flex items-center gap-2">
          <div class="w-0.5 h-4 bg-indigo-400 rounded-full"></div>
          <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold" id="section-morning"></p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 space-y-5">
          <!-- Q4: Bedtime (two times side by side) -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q4"></label>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <p class="text-xs text-slate-400 mb-1" id="label-in-bed"></p>
                <input
                  type="time"
                  id="time-in-bed"
                  class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                />
              </div>
              <div>
                <p class="text-xs text-slate-400 mb-1" id="label-sleep-attempt"></p>
                <input
                  type="time"
                  id="time-sleep-attempt"
                  class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                />
              </div>
            </div>
          </div>

          <!-- Q5: Time to fall asleep -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q5"></label>
            <div class="flex items-center gap-2">
              <input
                type="number"
                id="sleep-onset"
                min="0"
                max="999"
                class="w-24 border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
              <span class="text-sm text-slate-500" id="label-minutes-1"></span>
            </div>
          </div>

          <!-- Q6: Number of awakenings -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q6"></label>
            <input
              type="number"
              id="awakenings-count"
              min="0"
              max="99"
              class="w-24 border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <!-- Q7: Total wake time -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q7"></label>
            <div class="flex items-center gap-2">
              <input
                type="number"
                id="wake-time"
                min="0"
                max="999"
                class="w-24 border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
              <span class="text-sm text-slate-500" id="label-minutes-2"></span>
            </div>
          </div>

          <!-- Q8: Final morning awakening -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q8"></label>
            <input
              type="time"
              id="final-awakening"
              class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <!-- Q9: Got up time -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q9"></label>
            <input
              type="time"
              id="got-up"
              class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <!-- Q10: Sleep quality -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q10"></label>
            <div class="flex flex-wrap gap-2" id="q10-radios"></div>
          </div>
        </div>

        <!-- Save button -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition mt-2"
          id="btn-save-entry"
        ></button>
        <p id="entry-feedback" class="text-center text-sm text-green-600 mt-2 hidden"></p>
      </form>
    </div>

    <!-- ===== TAB: HISTORY ===== -->
    <div id="tab-history" class="tab-panel hidden">
      <div id="history-list" class="space-y-4"></div>
      <p id="history-empty" class="text-center text-slate-400 text-sm py-10 hidden"></p>
    </div>

    <!-- ===== TAB: SETTINGS ===== -->
    <div id="tab-settings" class="tab-panel hidden">

      <!-- Section 1: This child -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 space-y-3">
        <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold" id="label-this-child"></p>
        <p id="settings-child-name" class="text-base font-semibold text-slate-800"></p>
        <div>
          <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold mb-2" id="label-share-code"></p>
          <div class="flex items-center gap-3">
            <span id="share-code-display" class="font-mono text-lg tracking-widest font-bold text-indigo-700 bg-indigo-50 rounded-xl px-4 py-2"></span>
            <button
              onclick="copyShareCode()"
              class="text-sm font-medium px-3 py-2 rounded-xl border border-indigo-200 text-indigo-600 hover:bg-indigo-50 transition"
              id="btn-copy-code"
            ></button>
          </div>
          <p class="text-xs text-slate-400 mt-2" id="share-code-hint"></p>
          <p id="code-copied" class="text-xs text-green-600 mt-1 hidden"></p>
          <div id="members-list" class="mt-3 space-y-2"></div>
        </div>
      </div>

      <!-- Section 2: Children list (only shown if >1 child) -->
      <div id="settings-children-section" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 hidden">
        <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold mb-3" id="label-children-section"></p>
        <div id="settings-children-list" class="space-y-2"></div>
      </div>

      <!-- Section 3: Add child -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
        <button
          onclick="showScreen('children')"
          class="w-full bg-slate-50 hover:bg-slate-100 text-slate-700 font-semibold py-3 rounded-xl border border-slate-200 transition"
          id="btn-add-child"
        ></button>
      </div>

      <!-- Section 4: Account -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
        <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold mb-1" id="label-account"></p>
        <p id="user-email" class="text-sm text-slate-400"></p>
      </div>

      <button
        onclick="signOut()"
        class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-semibold py-3 rounded-xl border border-red-100 transition"
        id="btn-sign-out"
      ></button>
    </div>

  </main>
</div>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const SUPABASE_URL  = 'https://xdbveygpgzrxpowomdqi.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_vGsYHC4BkhPx1ofIySftjg_QXRUtnGX';

  // ============================================================
  // CLIENT
  // ============================================================
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: {
      flowType: 'implicit',
      detectSessionInUrl: true,
      persistSession: true,
    }
  });

  // ============================================================
  // STATE
  // ============================================================
  let user         = null;
  let children     = [];
  let currentChild = null;
  let lang         = localStorage.getItem('sovn-lang') || 'no';
  let currentTab   = 'new';
  let entries      = [];

  function getChildName() {
    return currentChild?.name || (lang === 'no' ? 'barnet' : 'your child');
  }

  // ============================================================
  // TRANSLATIONS
  // ============================================================
  const T = {
    no: {
      appTitle:           'Søvndagbok',
      authTitle:          'Søvndagbok',
      signInGoogle:       'Logg inn med Google',
      langSwitch:         'EN',
      tabNew:             'Ny registrering',
      tabHistory:         'Historikk',
      tabSettings:        'Innstillinger',
      labelDate:          'Dato',
      sectionBefore:      'Fylles ut før leggetid',
      sectionMorning:     'Fylles ut om morgenen',
      q1:                 (name) => `Hvordan har ${name} fungert på dagtid?`,
      q1Scale:            ['1 – Svært bra', '2 – Bra', '3 – Middels', '4 – Dårlig', '5 – Svært dårlig'],
      q2:                 (name) => `Har ${name} sovet på dagtid?`,
      q2NapTimes:         'Oppgi tidspunkt og varighet',

  // ============================================================
  // INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      user = session.user;
      await bootstrap();
    } else {
      showScreen('auth');
      renderLang();
    }

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        user = session.user;
        await bootstrap();
      } else if (event === 'SIGNED_OUT') {
        user         = null;
        children     = [];
        currentChild = null;
        entries      = [];
        showScreen('auth');
        renderLang();
      }
    });
  });

  async function bootstrap() {
    try {
      children = await loadChildren();
    } catch (err) {
      const el = document.getElementById('loading-error');
      if (el) {
        el.textContent = 'Kunne ikke koble til databasen. Sjekk at du har kjørt SQL-oppsettet i Supabase. (' + err.message + ')';
        el.classList.remove('hidden');
      }
      return;
    }
    if (children.length === 0) {
      renderLang();
      renderUserAvatar();
      showScreen('children');
      return;
    }
    const lastId = localStorage.getItem('sovn-last-child');
    currentChild = children.find(c => c.id === lastId) || children[0];
    await loadEntries();
    setTodayDate();
    renderLang();
    renderUserAvatar();
    showScreen('app');
    switchTab('new');
  }

  // ============================================================
  // SCREENS
  // ============================================================
  function showScreen(name) {
    ['loading', 'auth', 'children', 'app'].forEach(s => {
      document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== name);
    });
    if (name === 'children') {
      renderLang();
      renderUserAvatar();
      // Show back link only if user already has children
      const backLink = document.getElementById('children-back-link');
      if (backLink) {
        backLink.classList.toggle('hidden', children.length === 0);
      }
    }
  }

  // AUTH
  // ============================================================
  async function signInWithGoogle() {
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin }
    });
  }

  async function signOut() {
    await sb.auth.signOut();
  }

  // ============================================================
  function sleepQualityEmoji(q10) {
    return ['😩', '😪', '😐', '🙂', '😊'][q10 - 1] || '';
  }

  function generateShareCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
  }

  async function loadChildren() {
    const { data, error } = await sb.from('child_members')
      .select('child_id, children(id, name, share_code)')
      .eq('user_id', user.id);
    if (error) throw error;
    return (data || []).map(r => r.children).filter(Boolean);
  }

  async function createChild() {
    const name = document.getElementById('new-child-name').value.trim();
    if (!name) return;
    const shareCode = generateShareCode();
    const { data, error } = await sb.rpc('create_child', {
      child_name: name,
      child_share_code: shareCode
    });
    if (error) { showFeedback('create-error', error.message, true); return; }
    const child = typeof data === 'string' ? JSON.parse(data) : data;
    children.push(child);
    await selectChild(child);
  }

  async function joinChild() {
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    if (code.length !== 6) return;
    const { data, error } = await sb.rpc('join_child', { child_share_code: code });
    if (error) { showFeedback('join-error', error.message, true); return; }
    if (!data) { showFeedback('join-error', lang === 'no' ? 'Fant ingen barn med denne koden.' : 'No child found with this code.', true); return; }
    const child = typeof data === 'string' ? JSON.parse(data) : data;
    if (!children.find(c => c.id === child.id)) children.push(child);
    await selectChild(child);
  }

  async function selectChild(child) {
    currentChild = child;
    localStorage.setItem('sovn-last-child', child.id);
    await loadEntries();
    setTodayDate();
    renderLang();
    renderUserAvatar();
    showScreen('app');
    switchTab('new');
  }

  async function cycleChild() {
    if (children.length < 2) return;
    const idx = children.findIndex(c => c.id === currentChild.id);
    const next = children[(idx + 1) % children.length];
    await selectChild(next);
  }

  async function copyShareCode() {
    if (!currentChild) return;
    await navigator.clipboard.writeText(currentChild.share_code);
    showFeedback('code-copied', lang === 'no' ? 'Kopiert!' : 'Copied!');
  }

  async function loadMembers() {
    const { data } = await sb.rpc('get_child_members', { p_child_id: currentChild.id });
    return (typeof data === 'string' ? JSON.parse(data) : data) || [];
  }

  function renderMembersList(members) {
    const container = document.getElementById('members-list');
    if (!container) return;
    container.innerHTML = '';
    members.forEach(m => {
      const row = document.createElement('div');
      row.className = 'flex items-center gap-2';
      const img = m.avatar
        ? `<img src="${m.avatar}" class="w-6 h-6 rounded-full object-cover" />`
        : `<div class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 text-xs flex items-center justify-center font-semibold">${(m.name || m.email || '?').charAt(0).toUpperCase()}</div>`;
      row.innerHTML = `${img}<span class="text-sm text-slate-700">${m.name || m.email}</span>`;
      container.appendChild(row);
    });
  }

  // ============================================================
  async function loadEntries() {
    if (!currentChild) return;
    const { data } = await sb.from('sleep_entries')
      .select('*')
      .eq('child_id', currentChild.id)
      .order('date', { ascending: false });
    entries = data || [];

  async function handleSaveEntry(e) {
    e.preventDefault();
    if (!currentChild) {
      showFeedback('entry-feedback', '⚠️ Ingen barn valgt — last siden på nytt.', true);
      return;
    }
    try {
    const date   = document.getElementById('entry-date').value;
    const napVal = document.querySelector('input[name="nap"]:checked');
    const nap    = napVal ? napVal.value === 'yes' : null;

    const q1El  = document.querySelector('input[name="q1"]:checked');
    const q10El = document.querySelector('input[name="q10"]:checked');

    const payload = {
      child_id:            currentChild.id,
      date:                date,
      q1:                  q1El  ? parseInt(q1El.value)  : null,
      nap:                 nap,
      nap_times:           nap === true ? (document.getElementById('nap-times').value.trim() || null) : null,
      medication:          document.getElementById('medication').value.trim() || null,
      time_in_bed:         document.getElementById('time-in-bed').value || null,
      time_sleep_attempt:  document.getElementById('time-sleep-attempt').value || null,
      sleep_onset:         intOrNull('sleep-onset'),
      awakenings_count:    intOrNull('awakenings-count'),
      wake_time:           intOrNull('wake-time'),
      final_awakening:     document.getElementById('final-awakening').value || null,
      got_up:              document.getElementById('got-up').value || null,
      q10:                 q10El ? parseInt(q10El.value) : null,
      updated_at:          new Date().toISOString(),
    };

    const { data, error } = await sb
      .from('sleep_entries')
      .upsert(payload, { onConflict: 'child_id,date' })
      .select();

    if (error) {
      showFeedback('entry-feedback', '⚠️ ' + error.message, true);
      console.error('Save error:', error);
      return;
    }

    const saved = data?.[0] ?? payload;
    const idx = entries.findIndex(en => en.date === date);
    if (idx >= 0) entries[idx] = saved;
    else entries.unshift(saved);
    entries.sort((a, b) => b.date.localeCompare(a.date));
    showFeedback('entry-feedback', t().entrySaved);
    } catch (err) {
      showFeedback('entry-feedback', '⚠️ ' + err.message, true);
      console.error('handleSaveEntry crash:', err);
    }
  }

  async function deleteEntry(date) {
    if (!confirm(t().confirmDelete)) return;
    const { error } = await sb
      .from('sleep_entries')
      .delete()
      .eq('child_id', currentChild.id)
      .eq('date', date);
    if (!error) {
      entries = entries.filter(en => en.date !== date);
      renderHistory();
    }
  }

  function editEntry(date) {
    const entry = entries.find(en => en.date === date);
    if (!entry) return;

    document.getElementById('entry-date').value = entry.date;

    // Q1 radios
    document.querySelectorAll('input[name="q1"]').forEach(r => {
      r.checked = parseInt(r.value) === entry.q1;
    });

    // Q2 nap
    if (entry.nap !== null && entry.nap !== undefined) {
      document.getElementById(entry.nap ? 'nap-yes' : 'nap-no').checked = true;
      document.getElementById('nap-times-wrap').classList.toggle('hidden', !entry.nap);
    } else {
      document.querySelectorAll('input[name="nap"]').forEach(r => r.checked = false);
      document.getElementById('nap-times-wrap').classList.add('hidden');
    }
    document.getElementById('nap-times').value = entry.nap_times || '';

    // Q3
    document.getElementById('medication').value = entry.medication || '';

    // Q4
    document.getElementById('time-in-bed').value        = entry.time_in_bed || '';
    document.getElementById('time-sleep-attempt').value = entry.time_sleep_attempt || '';

    // Q5–Q7
    document.getElementById('sleep-onset').value      = entry.sleep_onset != null ? entry.sleep_onset : '';
    document.getElementById('awakenings-count').value = entry.awakenings_count != null ? entry.awakenings_count : '';
    document.getElementById('wake-time').value        = entry.wake_time != null ? entry.wake_time : '';

    // Q8–Q9
    document.getElementById('final-awakening').value = entry.final_awakening || '';
    document.getElementById('got-up').value          = entry.got_up || '';

    // Q10 radios
    document.querySelectorAll('input[name="q10"]').forEach(r => {
      r.checked = parseInt(r.value) === entry.q10;
    });

    switchTab('new');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ============================================================
  // TABS
  // ============================================================
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const active = btn.dataset.tab === tab;
      btn.classList.toggle('border-indigo-600', active);
      btn.classList.toggle('text-indigo-600', active);
      btn.classList.toggle('border-transparent', !active);
      btn.classList.toggle('text-slate-400', !active);
    });
    if (tab === 'history') renderHistory();
    if (tab === 'settings') {
      document.getElementById('user-email').textContent = user?.email || '';
      // Child name
      const nameEl = document.getElementById('settings-child-name');
      if (nameEl) nameEl.textContent = currentChild?.name || '';
      // Share code
      const codeEl = document.getElementById('share-code-display');
      if (codeEl) codeEl.textContent = currentChild?.share_code || '';
      // Children list (only if >1)
      renderSettingsChildrenList();
      // Members list
      loadMembers().then(renderMembersList);
    }
  }

  function renderSettingsChildrenList() {
    const section = document.getElementById('settings-children-section');
    const list    = document.getElementById('settings-children-list');
    if (!section || !list) return;
    if (children.length <= 1) {
      section.classList.add('hidden');
      return;
    }
    section.classList.remove('hidden');
    list.innerHTML = '';
    children.forEach(child => {
      const row = document.createElement('div');
      row.className = 'flex items-center justify-between py-1';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'text-sm text-slate-700' + (child.id === currentChild?.id ? ' font-semibold text-indigo-600' : '');
      nameSpan.textContent = child.name;
      row.appendChild(nameSpan);
      if (child.id !== currentChild?.id) {
        const btn = document.createElement('button');
        btn.textContent = t().switchChild;
        btn.className = 'text-xs font-medium px-3 py-1.5 rounded-lg border border-indigo-200 text-indigo-600 hover:bg-indigo-50 transition';
        btn.onclick = () => selectChild(child);
        row.appendChild(btn);
      }
      list.appendChild(row);
    });
  }

  function renderRadioGroup(containerId, name, options) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const checked    = document.querySelector(`input[name="${name}"]:checked`);
    const checkedVal = checked ? parseInt(checked.value) : null;
    container.innerHTML = '';
    options.forEach((label, i) => {
      const val  = i + 1;
      const id   = `${name}-${val}`;
      const wrap = document.createElement('label');
      wrap.htmlFor   = id;
      const isChecked = checkedVal === val;
      wrap.className = `flex items-center gap-1.5 text-sm cursor-pointer border rounded-lg px-3 py-2 transition ${isChecked ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-indigo-50 hover:border-indigo-300'}`;

      const radio = document.createElement('input');
      radio.type      = 'radio';
      radio.name      = name;
      radio.id        = id;
      radio.value     = val;
      radio.className = 'sr-only';
      if (checkedVal === val) radio.checked = true;
      radio.onchange = () => renderRadioGroup(containerId, name, options);

      const span = document.createElement('span');
      span.textContent = label;

      wrap.appendChild(radio);
      wrap.appendChild(span);
      container.appendChild(wrap);
    });
  }

  // ============================================================
  // HISTORY RENDERING
  // ============================================================
  function renderHistory() {
    const list  = document.getElementById('history-list');
    const empty = document.getElementById('history-empty');
    list.innerHTML = '';

    if (!entries.length) {
      empty.textContent = t().historyEmpty;
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    const tx = t();
    entries.forEach(entry => {
      const card = document.createElement('div');
      const q10Colors = ['#ef4444','#f97316','#eab308','#22c55e','#6366f1'];
      const borderColor = entry.q10 ? q10Colors[entry.q10 - 1] : '#e2e8f0';
      card.className = 'bg-white rounded-2xl shadow-sm border border-slate-100 p-5 overflow-hidden relative';
      card.style.borderLeft = `4px solid ${borderColor}`;

      const dateHeading = document.createElement('p');
      dateHeading.className = 'font-semibold text-slate-800 mb-3 capitalize';
      dateHeading.textContent = formatDate(entry.date, lang);
      card.appendChild(dateHeading);

      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm mb-4';

      buildSummaryFields(entry, tx).forEach(([label, value]) => {
        if (value === null || value === undefined || value === '') return;
        const lEl = document.createElement('span');
        lEl.className   = 'text-slate-400 truncate';
        lEl.textContent = label;
        const vEl = document.createElement('span');
        vEl.className   = 'text-slate-700 font-medium';
        vEl.textContent = value;
        grid.appendChild(lEl);
        grid.appendChild(vEl);
      });
      card.appendChild(grid);

      const btnRow = document.createElement('div');
      btnRow.className = 'flex gap-2';

      const editBtn = document.createElement('button');
      editBtn.textContent = tx.editBtn;
      editBtn.className   = 'flex-1 text-sm font-medium py-2 rounded-xl border border-indigo-200 text-indigo-600 hover:bg-indigo-50 transition';
      editBtn.onclick     = () => editEntry(entry.date);

      const delBtn = document.createElement('button');
      delBtn.textContent = tx.deleteBtn;
      delBtn.className   = 'flex-1 text-sm font-medium py-2 rounded-xl border border-red-100 text-red-500 hover:bg-red-50 transition';
      delBtn.onclick     = () => deleteEntry(entry.date);

      btnRow.appendChild(editBtn);
      btnRow.appendChild(delBtn);
      card.appendChild(btnRow);

      list.appendChild(card);
    });
  }

  function buildSummaryFields(entry, tx) {
    return [
      [tx.fieldQ1,           entry.q1  != null ? tx.q1Scale[entry.q1 - 1]   : null],
      [tx.fieldNap,          entry.nap === true ? tx.yes : entry.nap === false ? tx.no_ : null],
      [tx.fieldNapTimes,     entry.nap_times],
      [tx.fieldMed,          entry.medication],
      [tx.fieldInBed,        entry.time_in_bed],
      [tx.fieldSleepAttempt, entry.time_sleep_attempt],
      [tx.fieldOnset,        entry.sleep_onset != null ? entry.sleep_onset + tx.minutesSuffix : null],
      [tx.fieldAwakenings,   entry.awakenings_count != null ? String(entry.awakenings_count) : null],
      [tx.fieldWakeTime,     entry.wake_time != null ? entry.wake_time + tx.minutesSuffix : null],
      [tx.fieldFinalWake,    entry.final_awakening],
      [tx.fieldGotUp,        entry.got_up],
      [tx.fieldQ10,          entry.q10 != null ? sleepQualityEmoji(entry.q10) + ' ' + tx.q10Scale[entry.q10 - 1] : null],
    ];
  }

  // ============================================================
  // USER AVATAR
  // ============================================================
  function renderUserAvatar() {
    // App screen avatars
    const avatarImg      = document.getElementById('user-avatar');
    const avatarFallback = document.getElementById('user-avatar-fallback');
    // Children screen avatars
    const childrenAvatarImg      = document.getElementById('children-avatar-img');
    const childrenAvatarFallback = document.getElementById('children-avatar-fallback');

    const avatarUrl = user?.user_metadata?.avatar_url;
    const name      = user?.user_metadata?.full_name || user?.email || '';
    const initial   = name.charAt(0).toUpperCase();

    if (avatarImg && avatarFallback) {
      if (avatarUrl) {
        avatarImg.src = avatarUrl;
        avatarImg.classList.remove('hidden');
        avatarFallback.classList.add('hidden');
      } else {
        avatarFallback.textContent = initial;
        avatarFallback.classList.remove('hidden');
        avatarImg.classList.add('hidden');
      }
    }

    if (childrenAvatarImg && childrenAvatarFallback) {
      if (avatarUrl) {
        childrenAvatarImg.src = avatarUrl;
        childrenAvatarImg.classList.remove('hidden');
        childrenAvatarFallback.classList.add('hidden');
      } else {
        childrenAvatarFallback.textContent = initial;
        childrenAvatarFallback.classList.remove('hidden');
        childrenAvatarImg.classList.add('hidden');
      }
    }
  }

  // ============================================================
  // NAP TOGGLE
  // ============================================================
  function toggleNapTimes() {
    const yes = document.getElementById('nap-yes').checked;
    document.getElementById('nap-times-wrap').classList.toggle('hidden', !yes);
  }

  // ============================================================
  // HELPERS
  // ============================================================
  function setTodayDate() {
    const today = new Date();
    const yyyy  = today.getFullYear();
    const mm    = String(today.getMonth() + 1).padStart(2, '0');
    const dd    = String(today.getDate()).padStart(2, '0');
    document.getElementById('entry-date').value = `${yyyy}-${mm}-${dd}`;
  }

  function setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  function setAttr(id, attr, val) {
    const el = document.getElementById(id);
    if (el) el.setAttribute(attr, val);
  }

  function intOrNull(id) {
    const val = document.getElementById(id).value;
    return val === '' ? null : parseInt(val, 10);
  }

  function showFeedback(id, msg, isError = false) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = `text-sm mt-2 ${isError ? 'text-red-600' : 'text-green-600'}`;
    el.classList.remove('hidden');
    if (!isError) setTimeout(() => el.classList.add('hidden'), 3000);
  }

  function formatDate(dateStr, language) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const date      = new Date(y, m - 1, d);
    const locale    = language === 'no' ? 'nb-NO' : 'en-GB';
    return date.toLocaleDateString(locale, {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }
</script>
