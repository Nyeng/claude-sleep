<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Søvndagbok</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-active { @apply border-b-2 border-indigo-600 text-indigo-600 font-semibold; }
    input[type="time"], input[type="number"], input[type="text"], textarea {
      font-size: 16px; /* prevent iOS zoom */
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <div class="max-w-lg mx-auto px-4 py-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-indigo-700" id="app-title">Søvndagbok</h1>
        <p class="text-sm text-slate-500 mt-0.5" id="app-subtitle">Bjørn Bjørvatn · Helse Bergen</p>
      </div>
      <button
        id="lang-toggle"
        onclick="toggleLang()"
        class="text-sm border border-slate-300 rounded-full px-3 py-1 hover:bg-slate-100 transition"
      >EN</button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-6 border-b border-slate-200 mb-6">
      <button
        id="tab-new"
        onclick="showTab('new')"
        class="pb-2 text-sm tab-active"
      ></button>
      <button
        id="tab-history"
        onclick="showTab('history')"
        class="pb-2 text-sm text-slate-500 hover:text-slate-700 transition"
      ></button>
    </div>

    <!-- New Entry Form -->
    <div id="view-new">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1" id="lbl-date"></label>
        <input
          type="date"
          id="entry-date"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
        />
      </div>

      <!-- Before bedtime note -->
      <p class="text-xs text-slate-400 uppercase tracking-wide font-semibold mb-3 px-1" id="lbl-before-bed"></p>

      <!-- Q1: Daytime functioning -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3" id="q1-card">
        <p class="font-medium mb-3 text-sm" id="q1-label"></p>
        <div class="flex gap-2 flex-wrap" id="q1-options"></div>
      </div>

      <!-- Q2: Naps -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-3 text-sm" id="q2-label"></p>
        <div class="flex gap-3 mb-3">
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="radio" name="nap" value="yes" onchange="toggleNaps(true)" class="accent-indigo-600" />
            <span id="lbl-yes"></span>
          </label>
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="radio" name="nap" value="no" onchange="toggleNaps(false)" checked class="accent-indigo-600" />
            <span id="lbl-no"></span>
          </label>
        </div>
        <div id="nap-details" class="hidden">
          <label class="text-xs text-slate-500 mb-1 block" id="lbl-nap-times"></label>
          <textarea
            id="nap-times"
            rows="2"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"
          ></textarea>
        </div>
      </div>

      <!-- Q3: Medication (optional) -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-1 text-sm" id="q3-label"></p>
        <p class="text-xs text-slate-400 mb-3" id="q3-optional"></p>
        <input
          type="text"
          id="medication"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
        />
      </div>

      <!-- Morning note -->
      <p class="text-xs text-slate-400 uppercase tracking-wide font-semibold mb-3 mt-5 px-1" id="lbl-morning"></p>

      <!-- Q4: Bedtime -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-3 text-sm" id="q4-label"></p>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-slate-500 mb-1 block" id="lbl-in-bed"></label>
            <input type="time" id="time-in-bed" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          </div>
          <div>
            <label class="text-xs text-slate-500 mb-1 block" id="lbl-sleep-attempt"></label>
            <input type="time" id="time-sleep-attempt" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          </div>
        </div>
      </div>

      <!-- Q5: Sleep onset -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-3 text-sm" id="q5-label"></p>
        <div class="flex items-center gap-2">
          <input type="number" id="sleep-onset" min="0" max="300"
            class="w-24 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          <span class="text-sm text-slate-500" id="lbl-min"></span>
        </div>
      </div>

      <!-- Q6: Awakenings count -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-3 text-sm" id="q6-label"></p>
        <input type="number" id="awakenings-count" min="0" max="30"
          class="w-24 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>

      <!-- Q7: Total wake time -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-3 text-sm" id="q7-label"></p>
        <div class="flex items-center gap-2">
          <input type="number" id="wake-time" min="0" max="600"
            class="w-24 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          <span class="text-sm text-slate-500" id="lbl-min2"></span>
        </div>
      </div>

      <!-- Q8: Final awakening -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-3 text-sm" id="q8-label"></p>
        <input type="time" id="final-awakening" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>

      <!-- Q9: Got up -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-3">
        <p class="font-medium mb-3 text-sm" id="q9-label"></p>
        <input type="time" id="got-up" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>

      <!-- Q10: Sleep quality -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6" id="q10-card">
        <p class="font-medium mb-3 text-sm" id="q10-label"></p>
        <div class="flex gap-2 flex-wrap" id="q10-options"></div>
      </div>

      <button
        onclick="saveEntry()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition text-sm"
        id="btn-save"
      ></button>

      <p id="save-feedback" class="text-center text-sm text-green-600 mt-3 hidden"></p>
    </div>

    <!-- History View -->
    <div id="view-history" class="hidden">
      <div id="history-empty" class="text-center text-slate-400 text-sm py-12 hidden">
        <p id="lbl-no-entries"></p>
      </div>
      <div id="history-list" class="space-y-3"></div>
    </div>

  </div>

  <script>
    // ─── Language strings ────────────────────────────────────────────────────
    const strings = {
      no: {
        appTitle: "Søvndagbok",
        appSubtitle: "Bjørn Bjørvatn · Helse Bergen",
        tabNew: "Ny registrering",
        tabHistory: "Historikk",
        lblDate: "Dato",
        beforeBed: "Fylles ut før leggetid",
        morning: "Fylles ut om morgenen",
        q1: "1. Hvordan har barnet fungert på dagtid?",
        q1Scale: ["1 – Svært bra", "2 – Bra", "3 – Middels", "4 – Dårlig", "5 – Svært dårlig"],
        q2: "2. Tok barnet én eller flere hvileblunder i løpet av dagen?",
        yes: "Ja",
        no: "Nei",
        napTimes: "Angi tidspunkter for blundene",
        q3: "3. Tok barnet søvnmedisin?",
        q3Optional: "Valgfritt – noter medisin og dose",
        q4: "4. Hvilket klokkeslett gikk barnet til sengs?",
        inBed: "La seg",
        sleepAttempt: "Prøvde å sove",
        q5: "5. Hvor lang tid tok det før barnet sovnet?",
        q6: "6. Hvor mange ganger våknet barnet i løpet av natten?",
        q7: "7. Hvor lenge var barnet våkent totalt under nattlige oppvåkninger?",
        q8: "8. Når våknet barnet opp om morgenen uten å sovne igjen?",
        q9: "9. Når stod barnet opp?",
        q10: "10. Hvordan var siste natts søvn totalt sett?",
        q10Scale: ["1 – Svært lett", "2 – Lett", "3 – Middels", "4 – Dyp", "5 – Svært dyp"],
        min: "minutter",
        save: "Lagre",
        saved: "Lagret!",
        noEntries: "Ingen registreringer ennå.",
        deleteConfirm: "Slett denne registreringen?",
        delete: "Slett",
        naps: "Blunder",
        medication: "Medisin",
        bedtime: "Leggetid",
        onset: "Innsovningstid",
        awakenings: "Oppvåkninger",
        wakeTime: "Våkentid",
        finalWake: "Endelig oppvåkning",
        gotUp: "Stod opp",
        quality: "Søvnkvalitet",
        functioning: "Dagtidsfunksjon",
        edit: "Rediger",
      },
      en: {
        appTitle: "Sleep Diary",
        appSubtitle: "Bjørn Bjørvatn · Helse Bergen",
        tabNew: "New entry",
        tabHistory: "History",
        lblDate: "Date",
        beforeBed: "Fill out before bedtime",
        morning: "Fill out in the morning",
        q1: "1. How did your child function during the day?",
        q1Scale: ["1 – Very good", "2 – Good", "3 – Moderate", "4 – Poor", "5 – Very poor"],
        q2: "2. Did your child take one or more naps during the day?",
        yes: "Yes",
        no: "No",
        napTimes: "Note the times of the naps",
        q3: "3. Did your child take any sleep medication?",
        q3Optional: "Optional – note medication and dose",
        q4: "4. What time did your child go to bed?",
        inBed: "In bed",
        sleepAttempt: "Tried to sleep",
        q5: "5. How long did it take for your child to fall asleep?",
        q6: "6. How many times did your child wake up during the night?",
        q7: "7. How long was your child awake in total during nighttime awakenings?",
        q8: "8. When did your child wake up for the last time in the morning?",
        q9: "9. When did your child get up?",
        q10: "10. How was last night's sleep overall?",
        q10Scale: ["1 – Very light", "2 – Light", "3 – Moderate", "4 – Deep", "5 – Very deep"],
        min: "minutes",
        save: "Save",
        saved: "Saved!",
        noEntries: "No entries yet.",
        deleteConfirm: "Delete this entry?",
        delete: "Delete",
        naps: "Naps",
        medication: "Medication",
        bedtime: "Bedtime",
        onset: "Sleep onset",
        awakenings: "Awakenings",
        wakeTime: "Wake time",
        finalWake: "Final awakening",
        gotUp: "Got up",
        quality: "Sleep quality",
        functioning: "Daytime functioning",
        edit: "Edit",
      }
    };

    // ─── State ───────────────────────────────────────────────────────────────
    let lang = localStorage.getItem('sovn-lang') || 'no';
    let currentTab = 'new';
    let editingDate = null;

    // ─── Init ────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      setTodayDate();
      renderLang();
    });

    function setTodayDate() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('entry-date').value = today;
    }

    // ─── Language ────────────────────────────────────────────────────────────
    function toggleLang() {
      lang = lang === 'no' ? 'en' : 'no';
      localStorage.setItem('sovn-lang', lang);
      renderLang();
    }

    function t(key) {
      return strings[lang][key];
    }

    function renderLang() {
      const s = strings[lang];
      document.getElementById('lang-toggle').textContent = lang === 'no' ? 'EN' : 'NO';
      document.getElementById('app-title').textContent = s.appTitle;
      document.getElementById('app-subtitle').textContent = s.appSubtitle;
      document.getElementById('tab-new').textContent = s.tabNew;
      document.getElementById('tab-history').textContent = s.tabHistory;
      document.getElementById('lbl-date').textContent = s.lblDate;
      document.getElementById('lbl-before-bed').textContent = s.beforeBed;
      document.getElementById('lbl-morning').textContent = s.morning;
      document.getElementById('q1-label').textContent = s.q1;
      document.getElementById('q2-label').textContent = s.q2;
      document.getElementById('lbl-yes').textContent = s.yes;
      document.getElementById('lbl-no').textContent = s.no;
      document.getElementById('lbl-nap-times').textContent = s.napTimes;
      document.getElementById('q3-label').textContent = s.q3;
      document.getElementById('q3-optional').textContent = s.q3Optional;
      document.getElementById('q4-label').textContent = s.q4;
      document.getElementById('lbl-in-bed').textContent = s.inBed;
      document.getElementById('lbl-sleep-attempt').textContent = s.sleepAttempt;
      document.getElementById('q5-label').textContent = s.q5;
      document.getElementById('lbl-min').textContent = s.min;
      document.getElementById('q6-label').textContent = s.q6;
      document.getElementById('q7-label').textContent = s.q7;
      document.getElementById('lbl-min2').textContent = s.min;
      document.getElementById('q8-label').textContent = s.q8;
      document.getElementById('q9-label').textContent = s.q9;
      document.getElementById('q10-label').textContent = s.q10;
      document.getElementById('btn-save').textContent = s.save;
      document.getElementById('lbl-no-entries').textContent = s.noEntries;

      // Scale buttons Q1
      renderScale('q1-options', 'q1', 5, s.q1Scale);
      // Scale buttons Q10
      renderScale('q10-options', 'q10', 5, s.q10Scale);

      if (currentTab === 'history') renderHistory();
    }

    function renderScale(containerId, name, count, labels) {
      const container = document.getElementById(containerId);
      const current = container.querySelector('input:checked')?.value;
      container.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const id = `${name}-${i}`;
        const label = document.createElement('label');
        label.className = 'flex items-center gap-1.5 text-sm cursor-pointer bg-slate-50 hover:bg-indigo-50 border border-slate-200 rounded-lg px-3 py-2 transition';
        label.innerHTML = `
          <input type="radio" name="${name}" value="${i}" id="${id}"
            class="accent-indigo-600" ${current == i ? 'checked' : ''} />
          <span>${labels[i-1]}</span>
        `;
        container.appendChild(label);
      }
    }

    // ─── Nap toggle ──────────────────────────────────────────────────────────
    function toggleNaps(show) {
      document.getElementById('nap-details').classList.toggle('hidden', !show);
    }

    // ─── Tab switching ───────────────────────────────────────────────────────
    function showTab(tab) {
      currentTab = tab;
      document.getElementById('view-new').classList.toggle('hidden', tab !== 'new');
      document.getElementById('view-history').classList.toggle('hidden', tab !== 'history');

      const tabNew = document.getElementById('tab-new');
      const tabHist = document.getElementById('tab-history');
      tabNew.className = tab === 'new'
        ? 'pb-2 text-sm tab-active'
        : 'pb-2 text-sm text-slate-500 hover:text-slate-700 transition';
      tabHist.className = tab === 'history'
        ? 'pb-2 text-sm tab-active'
        : 'pb-2 text-sm text-slate-500 hover:text-slate-700 transition';

      if (tab === 'history') renderHistory();
    }

    // ─── Save ────────────────────────────────────────────────────────────────
    function getFormData() {
      return {
        date: document.getElementById('entry-date').value,
        q1: document.querySelector('input[name="q1"]:checked')?.value || '',
        q2: document.querySelector('input[name="nap"]:checked')?.value || 'no',
        napTimes: document.getElementById('nap-times').value.trim(),
        medication: document.getElementById('medication').value.trim(),
        timeInBed: document.getElementById('time-in-bed').value,
        timeSleepAttempt: document.getElementById('time-sleep-attempt').value,
        sleepOnset: document.getElementById('sleep-onset').value,
        awakeningsCount: document.getElementById('awakenings-count').value,
        wakeTime: document.getElementById('wake-time').value,
        finalAwakening: document.getElementById('final-awakening').value,
        gotUp: document.getElementById('got-up').value,
        q10: document.querySelector('input[name="q10"]:checked')?.value || '',
      };
    }

    function setFormData(entry) {
      document.getElementById('entry-date').value = entry.date || '';
      // Q1
      if (entry.q1) {
        const el = document.querySelector(`input[name="q1"][value="${entry.q1}"]`);
        if (el) el.checked = true;
      }
      // Q2
      const napVal = entry.q2 || 'no';
      document.querySelector(`input[name="nap"][value="${napVal}"]`).checked = true;
      toggleNaps(napVal === 'yes');
      document.getElementById('nap-times').value = entry.napTimes || '';
      document.getElementById('medication').value = entry.medication || '';
      document.getElementById('time-in-bed').value = entry.timeInBed || '';
      document.getElementById('time-sleep-attempt').value = entry.timeSleepAttempt || '';
      document.getElementById('sleep-onset').value = entry.sleepOnset || '';
      document.getElementById('awakenings-count').value = entry.awakeningsCount || '';
      document.getElementById('wake-time').value = entry.wakeTime || '';
      document.getElementById('final-awakening').value = entry.finalAwakening || '';
      document.getElementById('got-up').value = entry.gotUp || '';
      // Q10
      if (entry.q10) {
        const el = document.querySelector(`input[name="q10"][value="${entry.q10}"]`);
        if (el) el.checked = true;
      }
    }

    function saveEntry() {
      const data = getFormData();
      if (!data.date) {
        alert(lang === 'no' ? 'Angi dato.' : 'Please enter a date.');
        return;
      }

      const entries = getEntries();
      const idx = entries.findIndex(e => e.date === data.date);
      if (idx >= 0) {
        entries[idx] = data;
      } else {
        entries.unshift(data);
      }
      entries.sort((a, b) => b.date.localeCompare(a.date));
      localStorage.setItem('sovn-entries', JSON.stringify(entries));

      const fb = document.getElementById('save-feedback');
      fb.textContent = t('saved');
      fb.classList.remove('hidden');
      setTimeout(() => fb.classList.add('hidden'), 2500);
      editingDate = null;
    }

    // ─── History ─────────────────────────────────────────────────────────────
    function getEntries() {
      try {
        return JSON.parse(localStorage.getItem('sovn-entries') || '[]');
      } catch { return []; }
    }

    function renderHistory() {
      const entries = getEntries();
      const list = document.getElementById('history-list');
      const empty = document.getElementById('history-empty');
      list.innerHTML = '';

      if (entries.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      const s = strings[lang];
      entries.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl shadow-sm border border-slate-100 p-5';

        const dateStr = formatDate(entry.date);
        const rows = buildSummaryRows(entry, s);

        card.innerHTML = `
          <div class="flex items-center justify-between mb-3">
            <span class="font-semibold text-indigo-700">${dateStr}</span>
            <div class="flex gap-2">
              <button onclick="editEntry('${entry.date}')"
                class="text-xs border border-slate-200 rounded-lg px-2.5 py-1 hover:bg-slate-50 transition text-slate-600">
                ${s.edit}
              </button>
              <button onclick="deleteEntry('${entry.date}')"
                class="text-xs border border-red-100 rounded-lg px-2.5 py-1 hover:bg-red-50 transition text-red-500">
                ${s.delete}
              </button>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm">
            ${rows}
          </div>
        `;
        list.appendChild(card);
      });
    }

    function buildSummaryRows(entry, s) {
      const rows = [];
      const add = (label, value) => {
        if (value !== '' && value !== null && value !== undefined) {
          rows.push(`<span class="text-slate-400">${label}</span><span class="text-slate-700">${value}</span>`);
        }
      };

      if (entry.q1) add(s.functioning, s.q1Scale[parseInt(entry.q1) - 1]);
      if (entry.q2 === 'yes') add(s.naps, entry.napTimes || s.yes);
      if (entry.medication) add(s.medication, entry.medication);
      if (entry.timeInBed) add(s.bedtime, entry.timeInBed + (entry.timeSleepAttempt ? ' → ' + entry.timeSleepAttempt : ''));
      if (entry.sleepOnset) add(s.onset, entry.sleepOnset + ' ' + s.min);
      if (entry.awakeningsCount) add(s.awakenings, entry.awakeningsCount);
      if (entry.wakeTime) add(s.wakeTime, entry.wakeTime + ' ' + s.min);
      if (entry.finalAwakening) add(s.finalWake, entry.finalAwakening);
      if (entry.gotUp) add(s.gotUp, entry.gotUp);
      if (entry.q10) add(s.quality, s.q10Scale[parseInt(entry.q10) - 1]);

      return rows.join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString(lang === 'no' ? 'nb-NO' : 'en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function deleteEntry(date) {
      if (!confirm(t('deleteConfirm'))) return;
      const entries = getEntries().filter(e => e.date !== date);
      localStorage.setItem('sovn-entries', JSON.stringify(entries));
      renderHistory();
    }

    function editEntry(date) {
      const entry = getEntries().find(e => e.date === date);
      if (!entry) return;
      editingDate = date;
      setFormData(entry);
      showTab('new');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
