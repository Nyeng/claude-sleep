  <script>
    // Show auth screen immediately if no Supabase session in localStorage
    // This makes FCP/LCP fire before any JS bundle loads
    try {
      const hasSession = Object.keys(localStorage).some(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
      if (!hasSession) {
        document.addEventListener('DOMContentLoaded', () => {
          document.getElementById('screen-loading').classList.add('hidden');
          document.getElementById('screen-auth').classList.remove('hidden');
        });
      }
    } catch(e) {}
  </script>

  <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Syne:wght@500;600;700;800&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Syne:wght@500;600;700;800&display=swap"></noscript>
  <style>
    :root {
      --bg:           #f2ede4;
      --surface:      #ffffff;
      --surface-2:    #faf7f3;
      --border:       #e0d8cc;
      --text-1:       #1c1712;
      --text-2:       #5c5248;
      --text-3:       #6e6259;
      --accent:       #b8401e;
      --accent-soft:  rgba(184,64,30,0.08);
      --accent-hover: #9a3318;
      --green:        #274d3a;
      --green-hover:  #1a3427;
      --green-soft:   rgba(39,77,58,0.07);
      --dot-color:    rgba(184,64,30,0.09);
    }

    html { font-size: 17px; }

    *, *::before, *::after {
      box-sizing: border-box;
      font-family: 'Spectral', Georgia, serif;
    }

    /* Prevent iOS input zoom */
    input, select, textarea { font-size: 16px !important; }

    .hidden { display: none !important; }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text-1);
    }

    /* Syne for UI labels — creates the serif/geometric tension */
    .ui-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.7rem;
      color: var(--text-3);
    }

    /* Accent label (section headers) */
    .accent-label {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.8125rem;
      color: var(--accent);
      white-space: nowrap;
    }

    /* Loading spinner */
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 1px 2px rgba(28,23,18,0.04), 0 4px 12px rgba(28,23,18,0.03);
    }

    /* Input */
    .field {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 11px 13px;
      color: var(--text-1);
      font-size: 1rem !important;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184,64,30,0.1);
    }
    .field::placeholder { color: var(--text-3); }

    /* Primary button (forest green) */
    .btn-primary {
      width: 100%;
      background: var(--green);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8125rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      padding: 13px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--green-hover); }
    .btn-primary:active { transform: scale(0.99); }

    /* Ghost button */
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.6875rem;
      letter-spacing: 0.05em;
      color: var(--text-2);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Tab button */
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Tab panel stagger */
    .tab-panel { animation: reveal 0.2s ease both; }
    .tab-panel .card:nth-child(1) { animation: cardIn 0.22s ease both; }
    .tab-panel .card:nth-child(2) { animation: cardIn 0.22s 0.04s ease both; }
    .tab-panel .card:nth-child(3) { animation: cardIn 0.22s 0.08s ease both; }
    .tab-panel .card:nth-child(4) { animation: cardIn 0.22s 0.12s ease both; }
    @keyframes reveal  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cardIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* Radio option */
    .radio-opt {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Spectral', serif;
      font-size: 0.9375rem;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 12px;
      background: var(--surface-2);
      color: var(--text-2);
      transition: all 0.15s;
    }
    .radio-opt:hover { border-color: var(--accent); color: var(--text-1); }
    .radio-opt.checked {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Yes/No toggle */
    .yn-opt {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Spectral', serif;
      font-size: 0.875rem;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 16px;
      background: var(--surface-2);
      color: var(--text-2);
      transition: all 0.15s;
    }
    .yn-opt:hover { border-color: var(--accent); }
    .yn-opt.yn-checked { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }

    /* Auth screen overlay */
    .auth-bg {
      background-color: var(--bg);
      background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    /* Sign-out button */
    .btn-danger {
      width: 100%;
      background: transparent;
      border: 1px solid #e8c8c0;
      border-radius: 8px;
      padding: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.6875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #b8401e;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: rgba(184,64,30,0.06); }

    /* Share code */
    .share-code {
      font-family: 'Syne', monospace;
      font-weight: 800;
      letter-spacing: 0.2em;
      font-size: 1.25rem;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(184,64,30,0.15);
      border-radius: 8px;
      padding: 7px 16px;
    }

    /* Number spinner hide */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* History collapse */
    .entry-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease;
      opacity: 0;
    }
    .entry-body.open {
      max-height: 500px;
      opacity: 1;
    }
    .entry-chevron {
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
      color: var(--text-3);
    }
    .entry-chevron.open {
      transform: rotate(180deg);
    }
    .entry-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      padding: 14px 16px;
    }
    .entry-header:hover .entry-chevron { color: var(--accent); }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* Section divider line */
    .section-rule {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 10px;
    }
    .section-rule::before, .section-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Tailwind utility replacements */
    .fixed { position: fixed; }
    .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .justify-end { justify-content: flex-end; }
    .gap-2 { gap: 0.5rem; }
    .p-4 { padding: 1rem; }
    .p-5 { padding: 1.25rem; }
    .p-6 { padding: 1.5rem; }
    .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
    .mb-3 { margin-bottom: 0.75rem; }
    .mb-8 { margin-bottom: 2rem; }
    .mb-10 { margin-bottom: 2.5rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .w-full { width: 100%; }
    .max-w-xs { max-width: 20rem; }
    .max-w-sm { max-width: 24rem; }
    .text-center { text-align: center; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .overflow-y-auto { overflow-y: auto; }

    /* Child badge pill */
    .child-badge {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.625rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      background: var(--accent-soft);
      border: 1px solid rgba(184,64,30,0.18);
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s;
    }
    .child-badge:hover { background: rgba(39,77,58,0.18); }
  </style>
</head>

<!-- ===== SCREEN: LOADING ===== -->
<div id="screen-loading" class="fixed inset-0 flex items-center justify-center auth-bg">
  <div class="text-center">
    <p style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:0.04em;color:var(--text-1);margin-bottom:16px;">Søvndagbok</p>
    <div class="spinner mx-auto mb-3"></div>
    <p id="loading-error" class="hidden text-sm max-w-xs mt-2" style="color: var(--accent); font-style: italic;"></p>
  </div>
</div>

<!-- ===== SCREEN: AUTH ===== -->
<div id="screen-auth" class="hidden fixed inset-0 flex items-center justify-center p-6 auth-bg">
  <div class="w-full max-w-xs">
    <div class="flex justify-end mb-10">
      <button id="auth-lang-btn" onclick="toggleLang()" class="btn-ghost"></button>
    </div>

    <div class="mb-10">
      <div style="font-size: 2.5rem; margin-bottom: 12px; line-height: 1;">🌙</div>
      <h1 id="auth-title" style="font-size: 2rem; font-weight: 700; color: var(--text-1); line-height: 1.15; margin-bottom: 8px;"></h1>
      <p style="font-size: 0.8125rem; color: var(--text-3); font-style: italic;">
        Basert på <a href="https://www.helse-bergen.no/nasjonal-kompetansetjeneste-for-sovnsykdommer-sovno/sovndagbok-sovno" target="_blank" rel="noopener" style="color: var(--accent); text-decoration: underline;">søvndagbok fra Helse Bergen</a>
      </p>
    </div>

    <!-- Google sign-in -->
    <button onclick="signInWithGoogle()" style="width:100%; display:flex; align-items:center; justify-content:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:13px 16px; cursor:pointer; transition: border-color 0.15s, box-shadow 0.15s;" onmouseover="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px rgba(184,64,30,0.1)'" onmouseout="this.style.borderColor='var(--border)';this.style.boxShadow='none'">
      <svg width="18" height="18" viewBox="0 0 48 48" fill="none">
        <path d="M47.532 24.552c0-1.636-.132-3.2-.388-4.704H24.48v8.898h12.944c-.556 3.01-2.242 5.562-4.782 7.278v6.048h7.742c4.532-4.176 7.148-10.326 7.148-17.52z" fill="#4285F4"/>
        <path d="M24.48 48c6.492 0 11.942-2.154 15.922-5.83l-7.742-6.048c-2.148 1.44-4.896 2.29-8.18 2.29-6.294 0-11.622-4.252-13.524-9.972H2.952v6.248C6.912 42.854 15.12 48 24.48 48z" fill="#34A853"/>
        <path d="M10.956 28.44A14.396 14.396 0 0 1 10.13 24c0-1.544.268-3.048.826-4.44v-6.248H2.952A23.978 23.978 0 0 0 .48 24c0 3.876.926 7.546 2.472 10.688l8.004-6.248z" fill="#FBBC05"/>
        <path d="M24.48 9.584c3.546 0 6.73 1.218 9.234 3.612l6.918-6.918C36.41 2.388 30.962 0 24.48 0 15.12 0 6.912 5.146 2.952 13.312l8.004 6.248c1.902-5.72 7.23-9.976 13.524-9.976z" fill="#EA4335"/>
      </svg>
      <span id="auth-google-btn-text" style="font-family:'Syne',sans-serif; font-weight:700; font-size:0.8125rem; letter-spacing:0.04em; color:var(--text-1);"></span>
    </button>

    <!-- Divider -->
    <div style="display:flex; align-items:center; gap:10px; margin:18px 0;">
      <div style="flex:1; height:1px; background:var(--border);"></div>
      <span id="auth-or-text" style="font-family:'Syne',sans-serif; font-size:0.625rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-3);"></span>
      <div style="flex:1; height:1px; background:var(--border);"></div>
    </div>

    <!-- Magic link form -->
    <div id="auth-magic-form">
      <div style="margin-bottom:10px;">
        <input id="auth-email-input" type="email" autocomplete="email" class="field" aria-label="E-postadresse"
          style="width:100%;"
          oninput="document.getElementById('auth-magic-error').textContent=''"
        />
      </div>
      <button onclick="sendMagicLink()" id="auth-magic-btn"
        style="width:100%; background:var(--green); color:#fff; border:none; border-radius:8px; padding:13px 16px; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; font-size:0.8125rem; letter-spacing:0.04em; transition: background 0.15s;"
        onmouseover="this.style.background='var(--green-hover)'" onmouseout="this.style.background='var(--green)'">
        <span id="auth-magic-btn-text"></span>
      </button>
      <p id="auth-magic-error" style="font-size:0.6875rem; color:var(--accent); margin-top:8px; min-height:1em;"></p>
    </div>

    <!-- Confirmation message shown after sending -->
    <div id="auth-magic-sent" class="hidden" style="background:var(--green-soft); border:1px solid rgba(39,77,58,0.18); border-radius:8px; padding:16px; text-align:center;">
      <div style="font-size:1.5rem; margin-bottom:8px;">📬</div>
      <p id="auth-magic-sent-text" style="font-size:0.8125rem; color:var(--green); font-weight:600; margin-bottom:4px;"></p>
      <p id="auth-magic-sent-sub" style="font-size:0.75rem; color:var(--text-3); font-style:italic;"></p>
      <button onclick="resetMagicForm()" style="margin-top:12px; background:none; border:none; cursor:pointer; font-family:'Syne',sans-serif; font-size:0.625rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-3);" id="auth-magic-back-btn"></button>
    </div>

    <p style="font-size:0.6875rem; color:var(--text-3); margin-top:16px; font-style:italic;">
      Ved å logge inn godtar du vår
      <a href="/personvern.html" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:underline;">personvernerklæring</a>.
    </p>
  </div>
</div>

<!-- ===== SCREEN: CHILDREN ===== -->
<div id="screen-children" class="hidden fixed inset-0 flex items-center justify-center auth-bg p-6 overflow-y-auto">
  <div class="w-full max-w-sm py-4">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-2">
        <img id="children-avatar-img" src="" alt="" class="hidden" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border);" />
        <div id="children-avatar-fallback" class="hidden" style="width:28px;height:28px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:0.7rem;font-family:'Syne',sans-serif;font-weight:800;display:flex;align-items:center;justify-content:center;"></div>
        <button onclick="signOut()" id="children-signout-btn" style="font-family:'Syne',sans-serif;font-size:0.625rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-3);background:none;border:none;cursor:pointer;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-3)'"></button>
      </div>
      <a id="children-back-link" href="#" onclick="showScreen('app'); return false;" class="hidden" style="font-family:'Syne',sans-serif;font-size:0.625rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent);text-decoration:none;"></a>
      <button id="children-lang-btn" onclick="toggleLang()" class="btn-ghost"></button>
    </div>

    <div style="margin-bottom: 28px;">
      <div style="font-size:2rem;margin-bottom:10px;">🌙</div>
      <h1 id="children-title" style="font-size:1.75rem;font-weight:700;color:var(--text-1);line-height:1.2;margin-bottom:6px;"></h1>
      <p style="font-size:0.75rem;color:var(--text-3);font-style:italic;">
        Basert på <a href="https://www.helse-bergen.no/nasjonal-kompetansetjeneste-for-sovnsykdommer-sovno/sovndagbok-sovno" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">søvndagbok fra Helse Bergen</a>
      </p>
    </div>

    <!-- Myself -->
    <div id="card-create-self" class="card p-5 mb-3" style="border-color:rgba(184,64,30,0.2);background:var(--accent-soft);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span>👤</span>
        <p id="create-self-heading" style="font-family:'Syne',sans-serif;font-weight:800;font-size:0.75rem;letter-spacing:0.04em;color:var(--accent);text-transform:uppercase;"></p>
      </div>
      <p id="create-self-desc" style="font-size:0.8125rem;font-style:italic;color:var(--text-2);margin-bottom:14px;"></p>
      <button onclick="createSelf()" class="btn-primary" id="btn-create-self"></button>
    </div>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:10px;margin:16px 0;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span id="label-or-child" class="ui-label"></span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>

    <!-- Create child -->
    <div class="card p-5 mb-3">
      <p id="create-child-heading" style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.6875rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-2);margin-bottom:10px;"></p>
      <input type="text" id="new-child-name" class="field" style="margin-bottom:10px;" aria-labelledby="create-child-heading" />
      <button onclick="createChild()" class="btn-primary" id="btn-create-child"></button>
      <p id="create-error" class="hidden" style="font-size:0.8125rem;color:var(--accent);margin-top:6px;font-style:italic;"></p>
    </div>

    <!-- Join with code -->
    <div class="card p-5">
      <p id="join-child-heading" style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.6875rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-2);margin-bottom:10px;"></p>
      <input type="text" id="join-code" maxlength="6" class="field" style="font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;text-align:center;margin-bottom:10px;" oninput="this.value = this.value.toUpperCase()" aria-labelledby="join-child-heading" />
      <button onclick="joinChild()" class="btn-primary" id="btn-join-child"></button>
      <p id="join-error" class="hidden" style="font-size:0.8125rem;color:var(--accent);margin-top:6px;font-style:italic;"></p>
    </div>
  </div>
</div>

<!-- ===== SCREEN: APP ===== -->
<div id="screen-app" class="hidden">

  <!-- Header -->
  <header style="position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--border);">
    <div style="max-width:760px;margin:0 auto;padding:10px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;">
      <h1 id="app-title" style="font-family:'Syne',sans-serif;font-weight:800;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></h1>
      <button id="child-badge" onclick="cycleChild()" class="child-badge"></button>
      <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;">
        <button id="app-lang-btn" onclick="toggleLang()" class="btn-ghost"></button>
        <img id="user-avatar" src="" alt="" class="hidden" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--border);" />
        <div id="user-avatar-fallback" class="hidden" style="width:26px;height:26px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-family:'Syne',sans-serif;font-weight:800;font-size:0.6875rem;display:flex;align-items:center;justify-content:center;"></div>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <div style="position:sticky;top:47px;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);">
    <div style="max-width:760px;margin:0 auto;padding:0 16px;display:flex;">
      <button id="tab-new-btn"      onclick="switchTab('new')"      class="tab-btn" data-tab="new"></button>
      <button id="tab-history-btn"  onclick="switchTab('history')"  class="tab-btn" data-tab="history"></button>
      <button id="tab-settings-btn" onclick="switchTab('settings')" class="tab-btn" data-tab="settings"></button>
    </div>
  </div>

  <!-- Content -->
  <main style="max-width:760px;margin:0 auto;padding:20px 16px 40px;">

    <!-- ===== TAB: NEW ENTRY ===== -->
    <div id="tab-new" class="tab-panel">
      <div id="person-switcher" style="margin-bottom:14px;"></div>
      <form id="entry-form" onsubmit="handleSaveEntry(event)" style="display:flex;flex-direction:column;gap:10px;">

        <!-- Date -->
        <div class="card p-4">
          <label class="ui-label" id="label-date" for="entry-date" style="display:block;margin-bottom:8px;"></label>
          <input type="date" id="entry-date" class="field" required onchange="onDateChange(this.value)" aria-labelledby="label-date" />
        </div>

        <!-- SECTION: Before bedtime -->
        <div class="section-rule">
          <span class="accent-label" id="section-before"></span>
        </div>

        <div class="card p-4" style="display:flex;flex-direction:column;gap:18px;">
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q1"></label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;" id="q1-radios"></div>
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q2"></label>
            <div style="display:flex;gap:8px;margin-bottom:8px;">
              <label class="yn-opt" id="yn-label-yes">
                <input type="radio" name="nap" value="yes" id="nap-yes" onchange="toggleNapTimes(); updateYnStyles()" style="display:none;" />
                <span id="label-yes"></span>
              </label>
              <label class="yn-opt" id="yn-label-no">
                <input type="radio" name="nap" value="no" id="nap-no" onchange="toggleNapTimes(); updateYnStyles()" style="display:none;" />
                <span id="label-no"></span>
              </label>
            </div>
            <div id="nap-times-wrap" class="hidden">
              <textarea id="nap-times" rows="2" class="field" style="resize:none;" aria-labelledby="label-q2"></textarea>
            </div>
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q3"></label>
            <input type="text" id="medication" class="field" aria-labelledby="label-q3" />
          </div>
        </div>

        <!-- SECTION: Morning -->
        <div class="section-rule">
          <span class="accent-label" id="section-morning"></span>
        </div>

        <div class="card p-4" style="display:flex;flex-direction:column;gap:18px;">
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q4"></label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <div>
                <p class="ui-label" id="label-in-bed" style="margin-bottom:6px;"></p>
                <input type="time" id="time-in-bed" class="field" aria-labelledby="label-in-bed" />
              </div>
              <div>
                <p class="ui-label" id="label-sleep-attempt" style="margin-bottom:6px;"></p>
                <input type="time" id="time-sleep-attempt" class="field" aria-labelledby="label-sleep-attempt" />
              </div>
            </div>
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q5"></label>
            <div style="display:flex;align-items:center;gap:10px;">
              <input type="number" id="sleep-onset" min="0" max="999" class="field" style="width:80px;" aria-labelledby="label-q5" />
              <span style="font-size:0.875rem;color:var(--text-3);font-style:italic;" id="label-minutes-1"></span>
            </div>
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q6"></label>
            <input type="number" id="awakenings-count" min="0" max="99" class="field" style="width:80px;" aria-labelledby="label-q6" />
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q7"></label>
            <div style="display:flex;align-items:center;gap:10px;">
              <input type="number" id="wake-time" min="0" max="999" class="field" style="width:80px;" aria-labelledby="label-q7" />
              <span style="font-size:0.875rem;color:var(--text-3);font-style:italic;" id="label-minutes-2"></span>
            </div>
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q8"></label>
            <input type="time" id="final-awakening" class="field" aria-labelledby="label-q8" />
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q9"></label>
            <input type="time" id="got-up" class="field" aria-labelledby="label-q9" />
          </div>
          <div>
            <label style="display:block;font-size:1.0625rem;font-weight:500;color:var(--text-1);margin-bottom:10px;font-style:italic;" id="label-q10"></label>
            <div style="display:flex;flex-wrap:wrap;gap:6px;" id="q10-radios"></div>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="btn-save-entry" style="margin-top:4px;"></button>
        <p id="entry-feedback" class="hidden" style="text-align:center;font-size:0.875rem;font-style:italic;margin-top:2px;"></p>
      </form>
    </div>

    <!-- ===== TAB: HISTORY ===== -->
    <div id="tab-history" class="tab-panel hidden">

      <!-- Sleep chart -->
      <div id="sleep-chart" class="card hidden" style="padding:16px 16px 12px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span class="accent-label" id="chart-title"></span>
          <div style="display:flex;gap:3px;">
            <button id="chart-period-14" onclick="setChartPeriod(14)" style="font-family:'Syne',sans-serif;font-size:0.5625rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--border);transition:all 0.15s;"></button>
            <button id="chart-period-28" onclick="setChartPeriod(28)" style="font-family:'Syne',sans-serif;font-size:0.5625rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--border);transition:all 0.15s;"></button>
            <button id="chart-period-0"  onclick="setChartPeriod(0)"  style="font-family:'Syne',sans-serif;font-size:0.5625rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--border);transition:all 0.15s;"></button>
          </div>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;">
          <button id="chart-metric-q10"              onclick="setChartMetric('q10')"              style="font-family:'Syne',sans-serif;font-size:0.5625rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid;transition:all 0.15s;"></button>
          <button id="chart-metric-sleep_onset"      onclick="setChartMetric('sleep_onset')"      style="font-family:'Syne',sans-serif;font-size:0.5625rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid;transition:all 0.15s;"></button>
          <button id="chart-metric-awakenings_count" onclick="setChartMetric('awakenings_count')" style="font-family:'Syne',sans-serif;font-size:0.5625rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid;transition:all 0.15s;"></button>
          <button id="chart-metric-q1"               onclick="setChartMetric('q1')"               style="font-family:'Syne',sans-serif;font-size:0.5625rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid;transition:all 0.15s;"></button>
        </div>
        <svg id="chart-svg" viewBox="0 0 480 155" style="width:100%;height:auto;display:block;overflow:visible;"></svg>
        <div id="chart-stats" style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);"></div>
      </div>

      <div id="history-list" style="display:flex;flex-direction:column;gap:10px;"></div>
      <p id="history-empty" class="hidden" style="text-align:center;color:var(--text-3);font-size:0.9375rem;font-style:italic;padding:40px 0;"></p>
    </div>

    <!-- ===== TAB: SETTINGS ===== -->
    <div id="tab-settings" class="tab-panel hidden" style="display:flex;flex-direction:column;gap:10px;">

      <div class="card p-4" style="display:flex;flex-direction:column;gap:12px;">
        <p class="ui-label" id="label-this-child"></p>
        <p id="settings-child-name" style="font-size:1.125rem;font-weight:600;color:var(--text-1);"></p>
        <div>
          <p class="ui-label" id="label-share-code" style="margin-bottom:8px;"></p>
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="share-code-display" class="share-code"></span>
            <button onclick="copyShareCode()" id="btn-copy-code" class="btn-ghost"></button>
          </div>
          <p style="font-size:0.75rem;color:var(--text-3);margin-top:6px;font-style:italic;" id="share-code-hint"></p>
          <p id="code-copied" class="hidden" style="font-size:0.75rem;color:var(--green);margin-top:4px;"></p>
          <div id="members-list" style="margin-top:10px;display:flex;flex-direction:column;gap:6px;"></div>
        </div>
      </div>

      <div id="settings-children-section" class="card p-4 hidden">
        <p class="ui-label" id="label-children-section" style="margin-bottom:12px;"></p>
        <div id="settings-children-list" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>

      <div class="card p-4">
        <button onclick="showScreen('children')" id="btn-add-child" style="width:100%;background:none;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.6875rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-2);cursor:pointer;padding:4px 0;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-2)'"></button>
      </div>

      <div class="card p-4">
        <p class="ui-label" id="label-account" style="margin-bottom:4px;"></p>
        <p id="user-email" style="font-size:0.875rem;color:var(--text-2);font-style:italic;"></p>
      </div>

      <button onclick="signOut()" class="btn-danger" id="btn-sign-out"></button>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
