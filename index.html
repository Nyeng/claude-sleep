<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Søvndagbok</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Prevent iOS input zoom */
    input, select, textarea { font-size: 16px !important; }

    /* Loading spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e7ff;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hide utility */
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!--
  ============================================================
  SUPABASE SQL SETUP — run this in your Supabase SQL editor
  ============================================================

  create table profiles (
    id uuid references auth.users on delete cascade primary key,
    child_name text default '',
    updated_at timestamptz default now()
  );

  create table sleep_entries (
    id uuid default gen_random_uuid() primary key,
    user_id uuid references auth.users on delete cascade not null,
    date date not null,
    q1 smallint,
    nap boolean,
    nap_times text,
    medication text,
    time_in_bed text,
    time_sleep_attempt text,
    sleep_onset int,
    awakenings_count int,
    wake_time int,
    final_awakening text,
    got_up text,
    q10 smallint,
    created_at timestamptz default now(),
    updated_at timestamptz default now(),
    unique(user_id, date)
  );

  alter table profiles enable row level security;
  alter table sleep_entries enable row level security;

  create policy "Users own profile" on profiles
    for all using (auth.uid() = id) with check (auth.uid() = id);

  create policy "Users own entries" on sleep_entries
    for all using (auth.uid() = user_id) with check (auth.uid() = user_id);

  create or replace function public.handle_new_user()
  returns trigger as $$
  begin
    insert into public.profiles (id) values (new.id) on conflict do nothing;
    return new;
  end;
  $$ language plpgsql security definer;

  create trigger on_auth_user_created
    after insert on auth.users
    for each row execute procedure public.handle_new_user();

  ============================================================
-->

<!-- ===== SCREEN: LOADING ===== -->
<div id="screen-loading" class="fixed inset-0 flex items-center justify-center bg-slate-50">
  <div class="spinner"></div>
</div>

<!-- ===== SCREEN: AUTH ===== -->
<div id="screen-auth" class="hidden fixed inset-0 flex items-center justify-center bg-slate-50 p-4">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 w-full max-w-sm text-center">
    <!-- Language toggle -->
    <div class="flex justify-end mb-6">
      <button
        id="auth-lang-btn"
        onclick="toggleLang()"
        class="text-xs font-semibold px-3 py-1.5 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 transition"
      ></button>
    </div>

    <!-- Title -->
    <div class="mb-6">
      <div class="text-3xl mb-1">🌙</div>
      <h1 class="text-2xl font-bold text-slate-800" id="auth-title"></h1>
      <p class="text-sm text-slate-400 mt-1">Bjørn Bjørvatn · Helse Bergen</p>
    </div>

    <!-- Google sign in -->
    <button
      onclick="signInWithGoogle()"
      class="w-full flex items-center justify-center gap-3 border border-slate-200 bg-white rounded-xl py-3 px-4 font-medium text-slate-700 hover:bg-slate-50 transition shadow-sm"
    >

<!-- ===== SCREEN: APP ===== -->
<div id="screen-app" class="hidden">
  <!-- Header -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-10">
    <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold text-slate-800" id="app-title"></h1>
      <div class="flex items-center gap-2">
        <!-- Lang toggle -->
        <button
          id="app-lang-btn"
          onclick="toggleLang()"
          class="text-xs font-semibold px-2.5 py-1 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 transition"
        ></button>
        <!-- Avatar -->
        <img id="user-avatar" src="" alt="" class="w-8 h-8 rounded-full border border-slate-200 object-cover hidden" />
        <div id="user-avatar-fallback" class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-xs font-bold hidden"></div>
        <!-- Logout -->
        <button onclick="signOut()" class="p-1.5 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 transition" title="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <div class="bg-white border-b border-slate-100 sticky top-[57px] z-10">
    <div class="max-w-lg mx-auto px-4 flex">
      <button
        id="tab-new-btn"
        onclick="switchTab('new')"
        class="tab-btn flex-1 py-3 text-sm font-semibold border-b-2 transition"
        data-tab="new"
      ></button>
      <button
        id="tab-history-btn"
        onclick="switchTab('history')"
        class="tab-btn flex-1 py-3 text-sm font-semibold border-b-2 transition"
        data-tab="history"
      ></button>
      <button
        id="tab-settings-btn"
        onclick="switchTab('settings')"
        class="tab-btn flex-1 py-3 text-sm font-semibold border-b-2 transition"
        data-tab="settings"
      ></button>
    </div>
  </div>

  <!-- Tab content -->
  <main class="max-w-lg mx-auto px-4 py-6">

    <!-- ===== TAB: NEW ENTRY ===== -->
    <div id="tab-new" class="tab-panel">
      <form id="entry-form" onsubmit="handleSaveEntry(event)">
        <!-- Date -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
          <label class="block text-xs uppercase tracking-wide text-slate-400 font-semibold mb-2" id="label-date"></label>
          <input
            type="date"
            id="entry-date"
            class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            required
          />
        </div>

        <!-- SECTION: Before bedtime -->
        <div class="mb-2 mt-5 px-1">
          <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold" id="section-before"></p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 space-y-5">
          <!-- Q1: Daytime functioning -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q1"></label>
            <div class="flex flex-wrap gap-2" id="q1-radios"></div>
          </div>

          <!-- Q2: Naps -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q2"></label>
            <div class="flex gap-4 mb-2">
              <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                <input type="radio" name="nap" value="yes" id="nap-yes" onchange="toggleNapTimes()" class="accent-indigo-600" />
                <span id="label-yes"></span>
              </label>
              <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                <input type="radio" name="nap" value="no" id="nap-no" onchange="toggleNapTimes()" class="accent-indigo-600" />
                <span id="label-no"></span>
              </label>
            </div>
            <div id="nap-times-wrap" class="hidden">
              <textarea
                id="nap-times"
                rows="2"
                class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"
              ></textarea>
            </div>
          </div>

          <!-- Q3: Medication (optional) -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q3"></label>
            <input
              type="text"
              id="medication"
              class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>
        </div>

        <!-- SECTION: Morning -->
        <div class="mb-2 mt-5 px-1">
          <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold" id="section-morning"></p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 space-y-5">
          <!-- Q4: Bedtime (two times side by side) -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q4"></label>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <p class="text-xs text-slate-400 mb-1" id="label-in-bed"></p>
                <input
                  type="time"
                  id="time-in-bed"
                  class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                />
              </div>
              <div>
                <p class="text-xs text-slate-400 mb-1" id="label-sleep-attempt"></p>
                <input
                  type="time"
                  id="time-sleep-attempt"
                  class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
                />
              </div>
            </div>
          </div>

          <!-- Q5: Time to fall asleep -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q5"></label>
            <div class="flex items-center gap-2">
              <input
                type="number"
                id="sleep-onset"
                min="0"
                max="999"
                class="w-24 border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
              <span class="text-sm text-slate-500" id="label-minutes-1"></span>
            </div>
          </div>

          <!-- Q6: Number of awakenings -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q6"></label>
            <input
              type="number"
              id="awakenings-count"
              min="0"
              max="99"
              class="w-24 border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <!-- Q7: Total wake time -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q7"></label>
            <div class="flex items-center gap-2">
              <input
                type="number"
                id="wake-time"
                min="0"
                max="999"
                class="w-24 border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
              <span class="text-sm text-slate-500" id="label-minutes-2"></span>
            </div>
          </div>

          <!-- Q8: Final morning awakening -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q8"></label>
            <input
              type="time"
              id="final-awakening"
              class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <!-- Q9: Got up time -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q9"></label>
            <input
              type="time"
              id="got-up"
              class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            />
          </div>

          <!-- Q10: Sleep quality -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2" id="label-q10"></label>
            <div class="flex flex-wrap gap-2" id="q10-radios"></div>
          </div>
        </div>

        <!-- Save button -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition mt-2"
          id="btn-save-entry"
        ></button>
        <p id="entry-feedback" class="text-center text-sm text-green-600 mt-2 hidden"></p>
      </form>
    </div>

    <!-- ===== TAB: HISTORY ===== -->
    <div id="tab-history" class="tab-panel hidden">
      <div id="history-list" class="space-y-4"></div>
      <p id="history-empty" class="text-center text-slate-400 text-sm py-10 hidden"></p>
    </div>

    <!-- ===== TAB: SETTINGS ===== -->
    <div id="tab-settings" class="tab-panel hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 space-y-4">
        <div>
          <label class="block text-xs uppercase tracking-wide text-slate-400 font-semibold mb-2" id="label-child-name"></label>
          <input
            type="text"
            id="child-name-input"
            class="w-full border border-slate-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300"
          />
        </div>
        <button
          onclick="saveProfile()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition"
          id="btn-save-profile"
        ></button>
        <p id="profile-feedback" class="text-center text-sm text-green-600 hidden"></p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
        <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold mb-1" id="label-account"></p>
        <p id="user-email" class="text-sm text-slate-400"></p>
      </div>

      <button
        onclick="signOut()"
        class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-semibold py-3 rounded-xl border border-red-100 transition"
        id="btn-sign-out"
      ></button>
    </div>

  </main>
</div>

<script>
  // ============================================================
  // CONFIG — replace with your actual Supabase project values
  // ============================================================
  const SUPABASE_URL  = 'https://xdbveygpgzrxpowomdqi.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_vGsYHC4BkhPx1ofIySftjg_QXRUtnGX';

  // ============================================================
  // CLIENT
  // ============================================================
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ============================================================
  // STATE
  // ============================================================
  let user       = null;
  let childName  = '';
  let lang       = localStorage.getItem('sovn-lang') || 'no';
  let currentTab = 'new';
  let entries    = [];

  // ============================================================
  // TRANSLATIONS
  // ============================================================
  const T = {

      minutes:           'minutter',

      q7:                (name) => `Hvor lenge var ${name} våken totalt ved nattlige oppvåkninger?`,
      q8:                (name) => `Når våknet ${name} endelig om morgenen?`,
      q9:                (name) => `Når stod ${name} opp?`,

      q10Scale:          ['1 – Svært lett', '2 – Lett', '3 – Middels', '4 – Dyp', '5 – Svært dyp'],
      yes:               'Ja',

      saveEntry:         'Lagre registrering',
      entrySaved:        'Registrering lagret!',

      fieldNapTimes:     'Tidspunkt dagsøvn',
      fieldMed:          'Medikament',
      fieldInBed:        'La seg',
      fieldSleepAttempt: 'Prøvde å sove',
      fieldOnset:        'Innsovningstid',
      fieldAwakenings:   'Oppvåkninger',
      fieldWakeTime:     'Våken tid natt',
      fieldFinalWake:    'Siste oppvåkning',
      fieldGotUp:        'Stod opp',
      fieldQ1:           'Dagtidsfungering',
      fieldQ10:          'Søvnkvalitet',
      minutesSuffix:     ' min',
    },
    en: {
      appTitle:          'Sleep Diary',
      authTitle:         'Sleep Diary',
      signInGoogle:      'Sign in with Google',
      langSwitch:        'NO',
      tabNew:            'New entry',
      tabHistory:        'History',
      tabSettings:       'Settings',
      labelDate:         'Date',
      sectionBefore:     'Fill out before bedtime',
      sectionMorning:    'Fill out in the morning',
      q1:                (name) => `How did ${name} function during the day?`,
      q1Scale:           ['1 – Very good', '2 – Good', '3 – Moderate', '4 – Poor', '5 – Very poor'],
      q2:                (name) => `Did ${name} nap during the day?`,
      q2NapTimes:        'Enter times and duration',
      q3:                (name) => `Medication given to ${name} (optional)`,
      q4:                (name) => `When did you put ${name} to bed?`,
      labelInBed:        'In bed',
      labelSleepAttempt: 'Tried to sleep',
      q5:                (name) => `How long did it take ${name} to fall asleep?`,
      minutes:           'minutes',
      q6:                (name) => `How many times did ${name} wake up during the night?`,
      q7:                (name) => `How long was ${name} awake in total during nighttime awakenings?`,
      q8:                (name) => `When did ${name} wake up for good in the morning?`,
      q9:                (name) => `When did ${name} get up?`,
      q10:               (name) => `How do you rate ${name}'s sleep quality?`,
      q10Scale:          ['1 – Very light', '2 – Light', '3 – Moderate', '4 – Deep', '5 – Very deep'],
      yes:               'Yes',
      no_:               'No',
      saveEntry:         'Save entry',
      entrySaved:        'Entry saved!',
      childNameLabel:    "Child's nickname",
      saveProfile:       'Save',
      profileSaved:      'Saved!',
      accountLabel:      'Account',
      signOut:           'Sign out',
      editBtn:           'Edit',
      deleteBtn:         'Delete',
      historyEmpty:      'No entries yet.',
      fallbackChild:     'your child',
      confirmDelete:     'Delete this entry?',
      fieldNap:          'Nap',
      fieldNapTimes:     'Nap times',
      fieldMed:          'Medication',
      fieldInBed:        'In bed',
      fieldSleepAttempt: 'Tried to sleep',
      fieldOnset:        'Sleep onset',
      fieldAwakenings:   'Awakenings',
      fieldWakeTime:     'Awake time (night)',
      fieldFinalWake:    'Final awakening',
      fieldGotUp:        'Got up',
      fieldQ1:           'Daytime functioning',
      fieldQ10:          'Sleep quality',
      minutesSuffix:     ' min',
    }
  };

  function t()      { return T[lang]; }
  function getName() { return childName || t().fallbackChild; }

  // ============================================================
  // INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      user = session.user;
      await bootstrap();
    } else {
      showScreen('auth');
      renderLang();
    }

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        user = session.user;
        await bootstrap();
      } else if (event === 'SIGNED_OUT') {
        user        = null;
        childName   = '';
        entries     = [];
        showScreen('auth');
        renderLang();
      }
    });
  });

  async function bootstrap() {
    await Promise.all([loadProfile(), loadEntries()]);
    setTodayDate();
    renderLang();
    renderUserAvatar();
    showScreen('app');
    switchTab('new');
  }

  // ============================================================
  // SCREENS
  // ============================================================
  function showScreen(name) {
    ['loading', 'auth', 'app'].forEach(s => {
      document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== name);
    });
  }

  // ============================================================
  // AUTH
  // ============================================================
  async function signInWithGoogle() {
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin }
    });
  }

  async function signOut() {
    await sb.auth.signOut();
  }

  // ============================================================
  // PROFILE
  // ============================================================
  async function loadProfile() {
    if (!user) return;
    const { data } = await sb
      .from('profiles')
      .select('child_name')
      .eq('id', user.id)
      .single();
    if (data) childName = data.child_name || '';
  }

  async function saveProfile() {
    const newName = document.getElementById('child-name-input').value.trim();
    const { error } = await sb
      .from('profiles')
      .upsert({ id: user.id, child_name: newName, updated_at: new Date().toISOString() });
    if (!error) {
      childName = newName;
      renderLang();
      showFeedback('profile-feedback', t().profileSaved);
    }
  }

  // ============================================================
  // ENTRIES
  // ============================================================
  async function loadEntries() {
    if (!user) return;
    const { data, error } = await sb
      .from('sleep_entries')
      .select('*')
      .eq('user_id', user.id)
      .order('date', { ascending: false });
    if (!error && data) entries = data;
  }

  async function handleSaveEntry(e) {
    e.preventDefault();
    const date   = document.getElementById('entry-date').value;
    const napVal = document.querySelector('input[name="nap"]:checked');
    const nap    = napVal ? napVal.value === 'yes' : null;

    const q1El  = document.querySelector('input[name="q1"]:checked');
    const q10El = document.querySelector('input[name="q10"]:checked');

    const payload = {
      user_id:             user.id,
      date:                date,
      q1:                  q1El  ? parseInt(q1El.value)  : null,
      nap:                 nap,
      nap_times:           nap === true ? (document.getElementById('nap-times').value.trim() || null) : null,
      medication:          document.getElementById('medication').value.trim() || null,
      time_in_bed:         document.getElementById('time-in-bed').value || null,
      time_sleep_attempt:  document.getElementById('time-sleep-attempt').value || null,
      sleep_onset:         intOrNull('sleep-onset'),
      awakenings_count:    intOrNull('awakenings-count'),
      wake_time:           intOrNull('wake-time'),
      final_awakening:     document.getElementById('final-awakening').value || null,
      got_up:              document.getElementById('got-up').value || null,
      q10:                 q10El ? parseInt(q10El.value) : null,
      updated_at:          new Date().toISOString(),
    };

    const { data, error } = await sb
      .from('sleep_entries')
      .upsert(payload, { onConflict: 'user_id,date' })
      .select()
      .single();

    if (!error && data) {
      const idx = entries.findIndex(en => en.date === date);
      if (idx >= 0) entries[idx] = data;
      else entries.unshift(data);
      entries.sort((a, b) => b.date.localeCompare(a.date));
      showFeedback('entry-feedback', t().entrySaved);
    }
  }

  async function deleteEntry(date) {
    if (!confirm(t().confirmDelete)) return;
    const { error } = await sb
      .from('sleep_entries')
      .delete()
      .eq('user_id', user.id)
      .eq('date', date);
    if (!error) {
      entries = entries.filter(en => en.date !== date);
      renderHistory();
    }
  }

  function editEntry(date) {
    const entry = entries.find(en => en.date === date);
    if (!entry) return;

    document.getElementById('entry-date').value = entry.date;

    // Q1 radios
    document.querySelectorAll('input[name="q1"]').forEach(r => {
      r.checked = parseInt(r.value) === entry.q1;
    });

    // Q2 nap
    if (entry.nap !== null && entry.nap !== undefined) {
      document.getElementById(entry.nap ? 'nap-yes' : 'nap-no').checked = true;
      document.getElementById('nap-times-wrap').classList.toggle('hidden', !entry.nap);
    } else {
      document.querySelectorAll('input[name="nap"]').forEach(r => r.checked = false);
      document.getElementById('nap-times-wrap').classList.add('hidden');
    }
    document.getElementById('nap-times').value = entry.nap_times || '';

    // Q3
    document.getElementById('medication').value = entry.medication || '';

    // Q4
    document.getElementById('time-in-bed').value        = entry.time_in_bed || '';
    document.getElementById('time-sleep-attempt').value = entry.time_sleep_attempt || '';

    // Q5–Q7
    document.getElementById('sleep-onset').value      = entry.sleep_onset != null ? entry.sleep_onset : '';
    document.getElementById('awakenings-count').value = entry.awakenings_count != null ? entry.awakenings_count : '';
    document.getElementById('wake-time').value        = entry.wake_time != null ? entry.wake_time : '';

    // Q8–Q9
    document.getElementById('final-awakening').value = entry.final_awakening || '';
    document.getElementById('got-up').value          = entry.got_up || '';

    // Q10 radios
    document.querySelectorAll('input[name="q10"]').forEach(r => {
      r.checked = parseInt(r.value) === entry.q10;
    });

    switchTab('new');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ============================================================
  // TABS
  // ============================================================
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const active = btn.dataset.tab === tab;
      btn.classList.toggle('border-indigo-600', active);
      btn.classList.toggle('text-indigo-600', active);
      btn.classList.toggle('border-transparent', !active);
      btn.classList.toggle('text-slate-400', !active);
    });
    if (tab === 'history') renderHistory();
    if (tab === 'settings') {
      document.getElementById('child-name-input').value = childName;
      document.getElementById('user-email').textContent = user?.email || '';
    }
  }

  // ============================================================
  // LANGUAGE
  // ============================================================
  function toggleLang() {
    lang = lang === 'no' ? 'en' : 'no';
    localStorage.setItem('sovn-lang', lang);
    renderLang();
    if (currentTab === 'history') renderHistory();
  }

  function renderLang() {
    const tx   = t();
    const name = getName();

    // Auth screen
    setText('auth-title', tx.authTitle);
    setText('auth-google-btn-text', tx.signInGoogle);
    setText('auth-lang-btn', tx.langSwitch);

    // Header / tabs
    setText('app-title', tx.appTitle);
    setText('app-lang-btn', tx.langSwitch);
    setText('tab-new-btn', tx.tabNew);
    setText('tab-history-btn', tx.tabHistory);
    setText('tab-settings-btn', tx.tabSettings);

    // New entry form
    setText('label-date', tx.labelDate);
    setText('section-before', tx.sectionBefore);
    setText('section-morning', tx.sectionMorning);

    setText('label-q1', tx.q1(name));
    renderRadioGroup('q1-radios', 'q1', tx.q1Scale);

    setText('label-q2', tx.q2(name));
    setText('label-yes', tx.yes);
    setText('label-no', tx.no_);
    setAttr('nap-times', 'placeholder', tx.q2NapTimes);

    setText('label-q3', tx.q3(name));
    setText('label-q4', tx.q4(name));
    setText('label-in-bed', tx.labelInBed);
    setText('label-sleep-attempt', tx.labelSleepAttempt);

    setText('label-q5', tx.q5(name));
    setText('label-minutes-1', tx.minutes);
    setText('label-q6', tx.q6(name));
    setText('label-q7', tx.q7(name));
    setText('label-minutes-2', tx.minutes);
    setText('label-q8', tx.q8(name));
    setText('label-q9', tx.q9(name));

    setText('label-q10', tx.q10(name));
    renderRadioGroup('q10-radios', 'q10', tx.q10Scale);

    setText('btn-save-entry', tx.saveEntry);

    // Settings
    setText('label-child-name', tx.childNameLabel);
    setText('btn-save-profile', tx.saveProfile);
    setText('label-account', tx.accountLabel);
    setText('btn-sign-out', tx.signOut);
  }

  function renderRadioGroup(containerId, name, options) {
    const container = document.getElementById(containerId);
    if (!container) return;
    // Preserve checked state
    const checked    = document.querySelector(`input[name="${name}"]:checked`);
    const checkedVal = checked ? parseInt(checked.value) : null;
    container.innerHTML = '';
    options.forEach((label, i) => {
      const val  = i + 1;
      const id   = `${name}-${val}`;
      const wrap = document.createElement('label');
      wrap.htmlFor  = id;
      wrap.className = 'flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 hover:bg-indigo-50 hover:border-indigo-300 transition';

      const radio = document.createElement('input');
      radio.type      = 'radio';
      radio.name      = name;
      radio.id        = id;
      radio.value     = val;
      radio.className = 'accent-indigo-600';
      if (checkedVal === val) radio.checked = true;

      const span = document.createElement('span');
      span.textContent = label;

      wrap.appendChild(radio);
      wrap.appendChild(span);
      container.appendChild(wrap);
    });
  }

  // ============================================================
  // HISTORY RENDERING
  // ============================================================
  function renderHistory() {
    const list  = document.getElementById('history-list');
    const empty = document.getElementById('history-empty');
    list.innerHTML = '';

    if (!entries.length) {
      empty.textContent = t().historyEmpty;
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    const tx = t();
    entries.forEach(entry => {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-2xl shadow-sm border border-slate-100 p-5';

      // Date heading
      const dateHeading = document.createElement('p');
      dateHeading.className = 'font-semibold text-slate-800 mb-3 capitalize';
      dateHeading.textContent = formatDate(entry.date, lang);
      card.appendChild(dateHeading);

      // Summary grid
      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm mb-4';

      buildSummaryFields(entry, tx).forEach(([label, value]) => {
        if (value === null || value === undefined || value === '') return;
        const lEl = document.createElement('span');
        lEl.className    = 'text-slate-400 truncate';
        lEl.textContent  = label;
        const vEl = document.createElement('span');
        vEl.className    = 'text-slate-700 font-medium';
        vEl.textContent  = value;
        grid.appendChild(lEl);
        grid.appendChild(vEl);
      });
      card.appendChild(grid);

      // Edit + Delete buttons
      const btnRow = document.createElement('div');
      btnRow.className = 'flex gap-2';

      const editBtn = document.createElement('button');
      editBtn.textContent = tx.editBtn;
      editBtn.className   = 'flex-1 text-sm font-medium py-2 rounded-xl border border-indigo-200 text-indigo-600 hover:bg-indigo-50 transition';
      editBtn.onclick     = () => editEntry(entry.date);

      const delBtn = document.createElement('button');
      delBtn.textContent = tx.deleteBtn;
      delBtn.className   = 'flex-1 text-sm font-medium py-2 rounded-xl border border-red-100 text-red-500 hover:bg-red-50 transition';
      delBtn.onclick     = () => deleteEntry(entry.date);

      btnRow.appendChild(editBtn);
      btnRow.appendChild(delBtn);
      card.appendChild(btnRow);

      list.appendChild(card);
    });
  }

  function buildSummaryFields(entry, tx) {
    return [
      [tx.fieldQ1,           entry.q1  != null ? tx.q1Scale[entry.q1 - 1]   : null],
      [tx.fieldNap,          entry.nap === true ? tx.yes : entry.nap === false ? tx.no_ : null],
      [tx.fieldNapTimes,     entry.nap_times],
      [tx.fieldMed,          entry.medication],
      [tx.fieldInBed,        entry.time_in_bed],
      [tx.fieldSleepAttempt, entry.time_sleep_attempt],
      [tx.fieldOnset,        entry.sleep_onset != null ? entry.sleep_onset + tx.minutesSuffix : null],
      [tx.fieldAwakenings,   entry.awakenings_count != null ? String(entry.awakenings_count) : null],
      [tx.fieldWakeTime,     entry.wake_time != null ? entry.wake_time + tx.minutesSuffix : null],
      [tx.fieldFinalWake,    entry.final_awakening],
      [tx.fieldGotUp,        entry.got_up],
      [tx.fieldQ10,          entry.q10 != null ? tx.q10Scale[entry.q10 - 1] : null],
    ];
  }

  // ============================================================
  // USER AVATAR
  // ============================================================
  function renderUserAvatar() {
    const avatarImg      = document.getElementById('user-avatar');
    const avatarFallback = document.getElementById('user-avatar-fallback');
    const avatarUrl      = user?.user_metadata?.avatar_url;
    const name           = user?.user_metadata?.full_name || user?.email || '';

    if (avatarUrl) {
      avatarImg.src = avatarUrl;
      avatarImg.classList.remove('hidden');
      avatarFallback.classList.add('hidden');
    } else {
      avatarFallback.textContent = name.charAt(0).toUpperCase();
      avatarFallback.classList.remove('hidden');
      avatarImg.classList.add('hidden');
    }
  }

  // ============================================================
  // NAP TOGGLE
  // ============================================================
  function toggleNapTimes() {
    const yes = document.getElementById('nap-yes').checked;
    document.getElementById('nap-times-wrap').classList.toggle('hidden', !yes);
  }

  // ============================================================
  // HELPERS
  // ============================================================
  function setTodayDate() {
    const today = new Date();
    const yyyy  = today.getFullYear();
    const mm    = String(today.getMonth() + 1).padStart(2, '0');
    const dd    = String(today.getDate()).padStart(2, '0');
    document.getElementById('entry-date').value = `${yyyy}-${mm}-${dd}`;
  }

  function setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  function setAttr(id, attr, val) {
    const el = document.getElementById(id);
    if (el) el.setAttribute(attr, val);
  }

  function intOrNull(id) {
    const val = document.getElementById(id).value;
    return val === '' ? null : parseInt(val, 10);
  }

  function showFeedback(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 3000);
  }

  function formatDate(dateStr, language) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const date      = new Date(y, m - 1, d);
    const locale    = language === 'no' ? 'nb-NO' : 'en-GB';
    return date.toLocaleDateString(locale, {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }
</script>
</body>
